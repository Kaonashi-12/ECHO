seed: 2026

experiment:
  output_dir: outputs/eval_generation_qwen05b_v100_stage2_ablation

model:
  name: Qwen/Qwen2.5-0.5B
  max_length: 768
  dtype: fp32
  trust_remote_code: false
  padding_side: left
  attn_implementation: eager
  gradient_checkpointing: false

lora:
  target_modules:
    - q_proj
    - v_proj
    - o_proj
  rank: 8
  alpha: 16
  dropout: 0.0

generation:
  batch_size: 4
  max_input_length: 768
  max_new_tokens: 128
  do_sample: false
  temperature: 1.0
  top_p: 1.0
  padding_side: left
  prediction_max_chars: 2048

checkpoints:
  - name: base_qwen
    type: base
    path: null
  - name: stage1_echo_ckpt500
    path: outputs/phase4_mask_real_math_qwen05b_v100_stage1_noreg_fp32_bs16x4/checkpoint_step_500.pt
    strict_lora: true
  - name: stage1_sft_final
    path: outputs/stage1_sft_real_math_qwen05b_v100_fp32_bs16x4/checkpoint_final.pt
    strict_lora: true
  - name: stage2_raw_final
    path: outputs/stage2_masked_sft_math_qwen05b_v100_from_stage1_noreg_step500_retry/checkpoint_final.pt
    strict_lora: true
  - name: stage2_top30_final
    path: outputs/stage2_masked_sft_math_qwen05b_v100_from_stage1_noreg_step500_top30_retry/checkpoint_final.pt
    strict_lora: true
  - name: stage2_full_sft_final
    path: outputs/stage2_full_sft_math_qwen05b_v100_from_stage1_noreg_step500/checkpoint_final.pt
    strict_lora: true

datasets:
  - name: math_test
    path: nlile/hendrycks-MATH-benchmark
    config: default
    split: test
    kind: hendrycks_math
    max_examples: null
    prompt_template: "Question: {problem}\nSolution:"
    answer_field: solution
    metadata_keys:
      - subject
      - level
  - name: gsm8k_test
    path: openai/gsm8k
    config: main
    split: test
    kind: gsm8k
    max_examples: null
  - name: arc_challenge_validation
    path: allenai/ai2_arc
    config: ARC-Challenge
    split: validation
    kind: arc_challenge
    max_examples: null
  - name: openbookqa_validation
    path: allenai/openbookqa
    config: main
    split: validation
    kind: openbookqa
    max_examples: null
  - name: commonsenseqa_validation
    path: tau/commonsense_qa
    split: validation
    kind: commonsenseqa
    max_examples: null
