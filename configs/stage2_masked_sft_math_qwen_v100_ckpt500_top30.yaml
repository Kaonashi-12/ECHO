seed: 2026

experiment:
  output_dir: outputs/stage2_masked_sft_math_qwen05b_v100_from_stage1_noreg_step500_top30_retry

checkpoint:
  path: outputs/phase4_mask_real_math_qwen05b_v100_stage1_noreg_fp32_bs16x4/checkpoint_step_500.pt
  load_lora: true
  strict_lora: true

data:
  mode: hf_prompt_completion
  path: nlile/hendrycks-MATH-benchmark
  config: default
  split: train
  max_examples: null
  prompt_template: "Question: {problem}\nSolution:"
  completion_template: " {solution}"
  metadata_keys:
    - subject
    - level

model:
  name: Qwen/Qwen2.5-0.5B
  max_length: 768
  dtype: fp32
  trust_remote_code: false
  padding_side: right
  attn_implementation: eager
  gradient_checkpointing: true
  gradient_checkpointing_use_reentrant: false

lora:
  target_modules:
    - q_proj
    - v_proj
    - o_proj
  rank: 8
  alpha: 16
  dropout: 0.0

mask_head:
  hidden_proj: 192
  mlp_hidden: 384
  temperature: 1.0

optim:
  lora_lr: 0.00005
  lora_weight_decay: 0.0
  max_lora_grad_norm: 1.0

training:
  steps: 2000
  batch_size: 2
  micro_batch_size: 1
  mask_strategy: learned
  mask_mode: soft
  mask_threshold: 0.5
  mask_calibration:
    mode: sample_top_fraction
    fraction: 0.3
  mask_loss_normalization: mask_sum
  mask_loss_budget_floor: null
  log_every: 1
  save_every: 500

wandb:
  enabled: true
  project: intent-update-mask-formal
  name: stage2-masked-sft-math-qwen05b-v100-from-stage1-noreg-step500-top30-retry
  mode: online
  allow_fallback_offline: true
