seed: 2026

experiment:
  output_dir: outputs/eval_generation_claim1_final_answer/qwen05b_v100_math500_local

model:
  name: Qwen/Qwen2.5-0.5B
  max_length: 768
  dtype: fp32
  trust_remote_code: false
  padding_side: left
  attn_implementation: eager
  gradient_checkpointing: false

lora:
  target_modules:
    - q_proj
    - v_proj
    - o_proj
  rank: 8
  alpha: 16
  dropout: 0.0

generation:
  batch_size: 8
  max_input_length: 768
  max_new_tokens: 256
  do_sample: false
  temperature: 1.0
  top_p: 1.0
  padding_side: left
  prediction_max_chars: 4096

checkpoints:
  - name: base_qwen
    type: base
    path: null
  - name: stage1_echo_2690_ckpt500
    path: outputs/phase4_mask_real_math_qwen05b_v100_stage1_reasoning_noreg_fp32_len512_bs4x4_fixedmean035/checkpoint_step_500.pt
    strict_lora: true
  - name: stage2_echo_2690_ckpt500_adaptive_final
    path: outputs/stage2_masked_sft_math_qwen05b_v100_from_2690_fixedmean_step500_adaptive/checkpoint_final.pt
    strict_lora: true
  - name: stage1_sft_final
    path: outputs/stage1_sft_real_math_qwen05b_v100_fp32_bs16x4/checkpoint_final.pt
    strict_lora: true
  - name: stage2_full_sft_final
    path: outputs/stage2_full_sft_math_qwen05b_v100_from_stage1_noreg_step500/checkpoint_final.pt
    strict_lora: true

datasets:
  - name: math500_local_test
    path: nlile/hendrycks-MATH-benchmark
    config: default
    split: test
    kind: hendrycks_math
    sample_size: null
    sample_seed: 6101
    prompt_template: "Problem: {problem}\nAnswer:"
    answer_template: "The answer is {answer}"
    metadata_keys:
      - subject
      - level
      - unique_id
