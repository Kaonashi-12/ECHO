seed: 2026

experiment:
  output_dir: outputs/eval_generation_claim1_quick/qwen05b_v100_math500_local_n128

model:
  name: Qwen/Qwen2.5-0.5B
  max_length: 768
  dtype: fp32
  trust_remote_code: false
  padding_side: left
  attn_implementation: eager
  gradient_checkpointing: false

lora:
  target_modules:
    - q_proj
    - v_proj
    - o_proj
  rank: 8
  alpha: 16
  dropout: 0.0

generation:
  batch_size: 8
  max_input_length: 768
  max_new_tokens: 256
  do_sample: false
  temperature: 1.0
  top_p: 1.0
  padding_side: left
  prediction_max_chars: 4096

checkpoints:
  - name: base_qwen
    type: base
    path: null
  - name: stage1_echo_clean_ckpt500
    path: outputs/claim1_stage1_echo_reasoning_raw_qwen05b_v100/checkpoint_step_500.pt
    strict_lora: true
  - name: stage2_echo_clean_final
    path: outputs/claim1_stage2_echo_math_from_stage1_echo_clean_qwen05b_v100/checkpoint_final.pt
    strict_lora: true
  - name: stage1_sft_reasoning_matched_ckpt500
    path: outputs/claim1_stage1_sft_reasoning_matched_qwen05b_v100/checkpoint_step_500.pt
    strict_lora: true
  - name: stage2_full_sft_matched_final
    path: outputs/claim1_stage2_full_sft_from_stage1_sft_reasoning_qwen05b_v100/checkpoint_final.pt
    strict_lora: true

datasets:
  - name: math500_local_test_n128
    path: nlile/hendrycks-MATH-benchmark
    config: default
    split: test
    kind: math500
    sample_size: 128
    sample_seed: 6101
    prompt_template: "Problem: {problem}\nAnswer:"
    answer_template: "The answer is {answer}"
    source_id_field: unique_id
    filters:
      - field: answer
        op: not_empty
      - field: solution
        op: not_empty
    metadata_keys:
      - subject
      - level
      - unique_id
