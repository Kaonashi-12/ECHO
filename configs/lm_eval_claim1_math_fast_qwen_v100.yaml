base_model:
  name: Qwen/Qwen2.5-0.5B
  trust_remote_code: false

lora:
  target_modules:
    - q_proj
    - v_proj
    - o_proj
  rank: 8
  alpha: 16
  dropout: 0.0

export:
  output_root: outputs/hf_exports/qwen05b_v100_claim1_math_fast
  save_dtype: fp16
  max_shard_size: 2GB

models:
  - name: base_qwen
    type: base
    pretrained: Qwen/Qwen2.5-0.5B
  - name: stage1_echo_2690_ckpt500
    checkpoint: outputs/phase4_mask_real_math_qwen05b_v100_stage1_reasoning_noreg_fp32_len512_bs4x4_fixedmean035/checkpoint_step_500.pt
    hf_export_dir: outputs/hf_exports/qwen05b_v100_2690_stage2_adaptive/stage1_2690_ckpt500
    strict_lora: true
  - name: stage2_echo_2690_ckpt500_adaptive_final
    checkpoint: outputs/stage2_masked_sft_math_qwen05b_v100_from_2690_fixedmean_step500_adaptive/checkpoint_final.pt
    hf_export_dir: outputs/hf_exports/qwen05b_v100_2690_stage2_adaptive/stage2_2690_ckpt500_adaptive_final
    strict_lora: true
  - name: stage1_sft_final
    checkpoint: outputs/stage1_sft_real_math_qwen05b_v100_fp32_bs16x4/checkpoint_final.pt
    hf_export_dir: outputs/hf_exports/qwen05b_v100_sft_baselines/stage1_sft_final
    strict_lora: true
  - name: stage2_full_sft_final
    checkpoint: outputs/stage2_full_sft_math_qwen05b_v100_from_stage1_noreg_step500/checkpoint_final.pt
    hf_export_dir: outputs/hf_exports/qwen05b_v100_sft_baselines/stage2_full_sft_final
    strict_lora: true

lm_eval:
  model: hf
  tasks:
    - hendrycks_math500
  # Official generation final-answer task. This requires HuggingFaceH4/MATH-500
  # to be available in the datasets cache or downloadable at runtime.
  num_fewshot: null
  model_args:
    dtype: float16
    trust_remote_code: false
  batch_size: auto
  device: cuda:0
  use_accelerate: true
  num_processes: 4
  log_samples: false
  limit: null
  output_root: outputs/lm_eval_official/qwen05b_v100_claim1_math_fast
