seed: 2026

experiment:
  output_dir: outputs/claim1_teacher_sanity_final_answer_only_qwen05b_v103

data:
  mode: real_math_cross
  domains:
    - name: gsm8k
      path: openai/gsm8k
      config: main
      split: train
      kind: gsm8k
      completion_mode: full_solution
    - name: svamp
      path: ChilleD/SVAMP
      split: train
      kind: svamp
      completion_mode: full_solution
    - name: asdiv
      path: EleutherAI/asdiv
      split: validation
      kind: asdiv
      completion_mode: full_solution
    - name: mawps
      path: garrethlee/MAWPS
      split: train
      kind: mawps
      completion_mode: full_solution
    - name: multiarith
      path: ChilleD/MultiArith
      split: train
      kind: multiarith
      completion_mode: full_solution
  retain_domains: []

target_loss:
  mode: answer_focus
  answer_window_tokens: 0
  min_tokens_per_sample: 1
  max_tokens_per_sample: 4
  include_numeric_tokens: false
  include_operator_tokens: false
  background_weight: 0.0
  focus_weight: 1.0

support_loss:
  mode: all

model:
  name: Qwen/Qwen2.5-0.5B
  max_length: 512
  dtype: bf16
  trust_remote_code: false
  padding_side: right
  attn_implementation: eager
  gradient_checkpointing: true
  gradient_checkpointing_use_reentrant: false

lora:
  target_modules:
    - q_proj
    - v_proj
    - o_proj
  rank: 8
  alpha: 16
  dropout: 0.0

mask_head:
  hidden_proj: 192
  mlp_hidden: 384
  temperature: 1.0

inner:
  lr: 0.01

outer:
  retain_kl_weight: 0.0
  mask_cost_weight: 0.0
  mask_budget_target: 0.35
  mask_budget_weight: 0.0
  mask_budget_mode: symmetric
  lora_meta_grad_weight: 0.0

teacher:
  steps: 8
  lr: 20.0
  temperature: 0.3
  mask_transform_mode: fixed_mean_exact
  mask_transform_target: 0.35
  eval_final: true

training:
  steps: 40
  support_batch_size: 8
  target_batch_size: 256
  retain_batch_size: 0
  mask_loss_normalization: mask_sum
  mask_loss_budget_floor: null
  support_micro_batch_size: 1
  target_micro_batch_size: 4
  retain_micro_batch_size: 1
  log_every: 1

summary:
  last_n: 40

wandb:
  enabled: false
  mode: offline
