base_model:
  name: Qwen/Qwen2.5-0.5B
  trust_remote_code: false

lora:
  target_modules:
    - q_proj
    - v_proj
    - o_proj
  rank: 8
  alpha: 16
  dropout: 0.0

export:
  output_root: outputs/hf_exports/qwen05b_v100_sft_baselines
  save_dtype: fp16
  max_shard_size: 2GB

models:
  - name: stage1_sft_final
    checkpoint: outputs/stage1_sft_real_math_qwen05b_v100_fp32_bs16x4/checkpoint_final.pt
    hf_export_dir: outputs/hf_exports/qwen05b_v100_sft_baselines/stage1_sft_final
    strict_lora: true
  - name: stage2_full_sft_final
    checkpoint: outputs/stage2_full_sft_math_qwen05b_v100_from_stage1_noreg_step500/checkpoint_final.pt
    hf_export_dir: outputs/hf_exports/qwen05b_v100_sft_baselines/stage2_full_sft_final
    strict_lora: true

lm_eval:
  model: hf
  tasks:
    - gsm8k
    - hendrycks_math
    - arc_challenge
    - openbookqa
    - commonsense_qa
  # null means: do not override the task's official default few-shot setting.
  num_fewshot: null
  model_args:
    dtype: float16
    trust_remote_code: false
  batch_size: auto
  device: cuda:0
  use_accelerate: true
  num_processes: 4
  log_samples: true
  limit: null
  output_root: outputs/lm_eval_official/qwen05b_v100_sft_baselines
